<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - London Life | Author Command Center</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <section id="loginScreen" class="login-screen" style="display: flex;">
        <div class="login-background">
            <img src="IMG_1218.jpeg" alt="Background" class="login-bg-image">
            <div class="login-overlay"></div>
        </div>
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <img src="unnamed.jpg" alt="London Life" class="login-logo">
                    <h1>LONDON LIFE</h1>
                    <p>Author Command Center</p>
                </div>
                <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="loginPassword" required placeholder="Enter your password" autocomplete="current-password">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                                <i class="fas fa-eye" id="passwordToggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password" onclick="showForgotPassword(event)">Forgot password?</a>
                    </div>
                    <div id="loginError" class="login-error"></div>
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <div class="login-footer">
                    <p>Secure access for authorized users only</p>
                    <div class="security-badges">
                        <span><i class="fas fa-shield-alt"></i> 256-bit SSL</span>
                        <span><i class="fas fa-lock"></i> Encrypted</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="auth.js"></script>
</body>
</html>
